<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYU JIALIN | 吕佳霖</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black' rx='20'/><circle cx='50' cy='50' r='45' stroke='%2300d2ff' stroke-width='2' fill='none' /><circle cx='50' cy='50' r='38' stroke='%2300d2ff' stroke-width='1' fill='none' stroke-dasharray='5,5' /><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='%2300d2ff' font-family='Arial, sans-serif' font-size='50' font-weight='bold'>吕</text></svg>">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --yonsei-blue: #003876; 
            --tech-blue: #00d2ff; 
            --accent-gold: #c5a059; 
            --admin-green: #2ecc71; 
        }
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; 
            background: #000; overflow-x: hidden; color: #fff; scroll-behavior: smooth; 
        }

        #tech-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* --- 导航栏 --- */
        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 4%; box-sizing: border-box; z-index: 9999; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(0,210,255,0.2); 
        }
        
        .nav-profile { display: flex; align-items: center; gap: 15px; cursor: pointer; position: relative; }
        
        .text-avatar-circle {
            width: 55px; height: 55px; border-radius: 50%; background: #000;
            border: 2px solid var(--tech-blue); display: flex; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold; color: var(--tech-blue);
            box-shadow: 0 0 15px rgba(0,210,255,0.4); position: relative; overflow: hidden;
            background-size: cover; background-position: center;
        }
        .text-avatar-circle::after { 
            content: ""; position: absolute; width: 100%; height: 2px; 
            background: rgba(0,210,255,0.6); top: -10%; animation: scan 3s linear infinite; z-index: 2;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a, .nav-links span { color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.3s; opacity: 0.8; }
        .nav-links a:hover, .nav-links span:hover { color: var(--tech-blue); opacity: 1; transform: scale(1.2); }

        /* --- 管理员 UI --- */
        .save-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: var(--admin-green); color: white; display: none; 
            align-items: center; justify-content: center; z-index: 10020; 
            font-weight: bold; cursor: pointer; 
        }
        body.is-admin .save-bar { display: flex; }
        body.is-admin .text-avatar-circle:hover::before {
            content: "更换图片"; position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;
            font-size: 10px; color: #fff; z-index: 3;
        }
        body.is-admin [contenteditable="true"] { border: 1px dashed var(--tech-blue); background: rgba(0,210,255,0.05); }

        /* --- 弹窗容器 --- */
        .cv-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10005; display: none; overflow-y: auto; padding: 40px 20px; }
        .cv-container { max-width: 850px; margin: 40px auto; background: #0a0a0a; padding: 50px; border: 1px solid rgba(0,210,255,0.2); position: relative;}
        
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 25px; position: relative; z-index: 2; }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 35px; }
        .module-card { padding: 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); transition: 0.4s; cursor: pointer; }
        .module-card:hover { transform: translateY(-10px); border-color: var(--tech-blue); box-shadow: 0 10px 30px rgba(0,210,255,0.1); }
        
        .admin-lock-btn { position: fixed; bottom: 30px; right: 30px; z-index: 9999; width: 60px; height: 60px; border-radius: 50%; background: var(--yonsei-blue); color: white; border: none; cursor: pointer; box-shadow: 0 0 15px var(--tech-blue); }
        
        .detail-header { border-left: 4px solid var(--tech-blue); padding-left: 20px; margin-bottom: 30px; }
        .detail-body { line-height: 2; color: #ddd; font-size: 1.1rem; }
    </style>
</head>
<body id="page-body">

<canvas id="tech-canvas"></canvas>

<div class="save-bar" onclick="masterSave()">
    <i class="fas fa-save"></i> &nbsp; 点击保存当前所有修改 (含头像、简介与模块详情)
</div>

<nav>
    <div class="nav-profile" onclick="handleProfileClick()">
        <input type="file" id="avatar-input" style="display:none" accept="image/*" onchange="previewImage(this)">
        <div class="text-avatar-circle" id="user-avatar">
            <span id="avatar-text">吕佳霖</span>
        </div>
        <div class="nav-name">
            <span style="display:block; font-weight:800; font-size:0.9rem;">LYU JIALIN</span>
            <span style="font-size:0.7rem; opacity:0.6;">YONSEI UNIVERSITY</span>
        </div>
    </div>
    
    <div class="nav-links">
        <span onclick="showContact('微信')"><i class="fab fa-weixin"></i></span>
        <span onclick="showContact('QQ')"><i class="fab fa-qq"></i></span>
        <a href="mailto:shljl0305@gmail.com"><i class="fas fa-envelope"></i></a>
        <a href="https://www.instagram.com/shljl66760555/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.youtube.com/channel/UCRPXO2NyWDIpln63wyL1FXg" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
</nav>

<section class="hero" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div class="hero-content" style="text-align:center; z-index:1;">
        <h1 style="font-size:clamp(2.5rem, 8vw, 4.5rem); letter-spacing:8px; text-shadow:0 0 20px var(--tech-blue);">WELCOME JIALIN LYU</h1>
        <p style="letter-spacing:5px; opacity:0.7;">GLOBAL LEADERS COLLEGE | IT DEPT</p>
    </div>
</section>

<main class="container">
    <div class="module-grid" id="main-grid"></div>
    <div class="admin-only" style="text-align:center; width:100%; margin-top:40px; display:none;">
        <button onclick="addMainMod()" style="padding:12px 25px; background:var(--yonsei-blue); color:white; border:none; cursor:pointer; font-weight:bold;">+ 增加新的主页模块</button>
    </div>
</main>

<div id="cv-overlay" class="cv-overlay">
    <span style="position:fixed; top:25px; right:40px; font-size:3rem; cursor:pointer; color:var(--tech-blue); z-index:10010;" onclick="closeCV()">&times;</span>
    <div class="cv-container">
        <h1 id="cv-name-display">吕佳霖 JIALIN LYU</h1>
        <p style="color:var(--accent-gold); font-weight:bold;">延世大学中国学联 IT 信息技术部负责人</p>
        <div class="bio-content" id="cv-bio" style="margin-top:30px; line-height:2.2; color:#ccc;">
            <p>您好，我是吕佳霖。目前就读于延世大学 Global Leaders College。</p>
            <p>作为延世大学中国学联 IT 信息技术部负责人，我致力于 AI 辅助开发流的效率提升研究。</p>
        </div>
    </div>
</div>

<div id="module-detail-overlay" class="cv-overlay">
    <span style="position:fixed; top:25px; right:40px; font-size:3rem; cursor:pointer; color:var(--tech-blue); z-index:10010;" onclick="closeDetail()">&times;</span>
    <div class="cv-container">
        <div class="detail-header">
            <h1 id="detail-title">标题</h1>
        </div>
        <div id="detail-content" class="detail-body">
            </div>
    </div>
</div>

<button class="admin-lock-btn" onclick="checkAuth()" id="lock-btn"><i class="fas fa-lock"></i></button>

<script>
    const KEY = "shljl8362226";
    let editMode = false;
    let pageData = [
        { title: "延世大学中国学联", brief: "IT 信息技术部负责人", content: "这里是详细的项目介绍..." }
    ];
    let userAvatarBase64 = "";

    // --- 粒子效果 ---
    const canvas = document.getElementById('tech-canvas'), ctx = canvas.getContext('2d');
    let particles = [];
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; particles = Array.from({length: 80}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, sx: (Math.random()-0.5)*0.4, sy: (Math.random()-0.5)*0.4, r: Math.random()*1.5 })); }
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(0,210,255,0.3)"; particles.forEach(p => { p.x+=p.sx; p.y+=p.sy; if(p.x<0||p.x>canvas.width) p.sx*=-1; if(p.y<0||p.y>canvas.height) p.sy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }); requestAnimationFrame(animate); }
    window.onresize = init; init(); animate();

    // --- 头像逻辑 ---
    function handleProfileClick() {
        if (editMode) document.getElementById('avatar-input').click();
        else openCV();
    }
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { userAvatarBase64 = e.target.result; updateAvatarDisplay(userAvatarBase64); };
            reader.readAsDataURL(input.files[0]);
        }
    }
    function updateAvatarDisplay(src) {
        const div = document.getElementById('user-avatar'), text = document.getElementById('avatar-text');
        if (src) { div.style.backgroundImage = `url(${src})`; text.style.display = 'none'; }
        else { div.style.backgroundImage = 'none'; text.style.display = 'block'; }
    }

    // --- 渲染逻辑 ---
    function renderMain() {
        const grid = document.getElementById('main-grid'); grid.innerHTML = '';
        pageData.forEach((m, i) => {
            const card = document.createElement('div'); card.className = 'module-card';
            card.onclick = (e) => { if (e.target.tagName !== 'H3' && e.target.tagName !== 'P') openDetail(i); };
            card.innerHTML = `
                <h3 contenteditable="${editMode}" onblur="updateField(${i},'title',this.innerText)">${m.title}</h3>
                <p contenteditable="${editMode}" onblur="updateField(${i},'brief',this.innerText)">${m.brief}</p>
            `;
            grid.appendChild(card);
        });
    }
    function updateField(idx, fld, val) { pageData[idx][fld] = val; }

    function openDetail(i) {
        const d = pageData[i];
        document.getElementById('detail-title').innerText = d.title;
        const cont = document.getElementById('detail-content');
        cont.innerHTML = d.content || "暂无详情";
        if(editMode) {
            cont.contentEditable = true;
            cont.style.border = "1px dashed var(--tech-blue)";
            cont.onblur = () => { pageData[i].content = cont.innerHTML; };
        } else {
            cont.contentEditable = false;
            cont.style.border = "none";
        }
        document.getElementById('module-detail-overlay').style.display = 'block';
    }

    function closeDetail() { document.getElementById('module-detail-overlay').style.display = 'none'; }
    function openCV() { document.getElementById('cv-overlay').style.display = 'block'; }
    function closeCV() { document.getElementById('cv-overlay').style.display = 'none'; }

    // --- 管理与保存 ---
    function checkAuth() {
        if (!editMode) {
            if (prompt("请输入管理员密码：") === KEY) {
                editMode = true;
                document.getElementById('page-body').classList.add('is-admin');
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('cv-bio').contentEditable = true;
                renderMain();
            }
        } else location.reload();
    }
    function addMainMod() { pageData.push({ title: "新标题", brief: "新描述", content: "在此输入详情..." }); renderMain(); }
    
    function masterSave() {
        const config = { pageData, bio: document.getElementById('cv-bio').innerHTML, avatar: userAvatarBase64 };
        localStorage.setItem('lyu_v3_final', JSON.stringify(config));
        alert("✨ 保存成功！");
        location.reload();
    }

    window.onload = () => {
        const saved = localStorage.getItem('lyu_v3_final');
        if (saved) {
            const d = JSON.parse(saved);
            pageData = d.pageData;
            document.getElementById('cv-bio').innerHTML = d.bio;
            userAvatarBase64 = d.avatar || "";
            updateAvatarDisplay(userAvatarBase64);
        }
        renderMain();
    }
    function showContact(c) { alert(c === '微信' ? '13091550035' : '1032515039'); }
</script>
</body>
</html>
